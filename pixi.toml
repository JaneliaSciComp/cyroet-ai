[workspace]
authors = ["allison-truhlar <truhlara@janelia.hhmi.org>"]
channels = ["conda-forge"]
name = "cryoet-schema"
platforms = ["linux-64"]
version = "0.1.0"

[environments]
default = { solve-group = "default" }
test = { features = ["test"], solve-group = "default" }

[dependencies]
python = ">=3.11"
pydantic = ">=2.6"
rapidfuzz = ">=3.0"

[tasks]
validate = "python -m scripts.validate"
json-schema = "python -m scripts.generate_json_schema"

[feature.test.dependencies]
pytest = ">=7.0"

[feature.test.tasks]
test = "pytest"
